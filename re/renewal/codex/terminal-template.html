<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>단말 템플릿</title>
  <link rel="stylesheet" href="./styles/tokens.css" />
  <link rel="stylesheet" href="./styles/templates.css" />
</head>
<body>
  <div class="shell shell-terminal">
    <header class="page-header">
      <div>
        <p class="eyebrow">WOORI TERMINAL TEMPLATE</p>
        <h1 class="page-title">단말 공통 템플릿</h1>
      </div>
      <div class="channel-badge channel-badge-terminal">영업점 단말</div>
    </header>
    <main class="terminal-layout">
      <section class="summary-strip">
        <div class="summary-card"><span class="summary-label">화면 유형</span><strong class="summary-value">입력형</strong></div>
        <div class="summary-card"><span class="summary-label">권장 사용</span><strong class="summary-value">G1, G2</strong></div>
        <div class="summary-card"><span class="summary-label">핵심 목적</span><strong class="summary-value">접수/등록</strong></div>
        <div class="summary-card"><span class="summary-label">안정화</span><strong class="summary-value text-brand">고정 데이터</strong></div>
      </section>
      <section class="terminal-body terminal-body-rich">
        <article class="panel panel-form">
          <div class="panel-head"><h2>좌측 메인 입력 영역</h2><span class="head-meta">폼, 문서 카드, 요청 입력</span></div>
          <div class="panel-body split-stack">
            <div class="info-note"><strong>설계 원칙</strong><p>좌측은 사용자가 직접 확인하는 주요 입력 영역으로 두고, 우측은 결과 요약과 다음 단계 안내로 구성합니다.</p></div>
            <div class="form-grid">
              <label class="field"><span>항목 A</span><input type="text" value="예시 값" /></label>
              <label class="field"><span>항목 B</span><input type="text" value="예시 값" /></label>
              <label class="field"><span>항목 C</span><input type="text" value="예시 값" /></label>
              <label class="field"><span>항목 D</span><input type="text" value="예시 값" /></label>
            </div>
          </div>
        </article>
        <article class="panel panel-side">
          <div class="panel-head"><h2>우측 요약 영역</h2><span class="status-chip status-chip-ok">요약 정보</span></div>
          <div class="panel-body split-stack">
            <div class="requirement-list">
              <div class="requirement-card"><strong>요약 카드 1</strong><p>핵심 안내 또는 결과 표시</p></div>
              <div class="requirement-card"><strong>요약 카드 2</strong><p>후속 단계 또는 누락 안내</p></div>
            </div>
            <div class="value-grid">
              <div class="value-card"><span>값 A</span><strong>예시</strong></div>
              <div class="value-card"><span>값 B</span><strong>예시</strong></div>
            </div>
          </div>
        </article>
      </section>
      <footer class="action-bar">
        <button class="btn btn-secondary" type="button">이전</button>
        <button class="btn btn-primary" type="button">다음</button>
      </footer>
    </main>
  </div>
</body>
</html>
