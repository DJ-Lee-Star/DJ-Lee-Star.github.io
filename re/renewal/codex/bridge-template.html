<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>브릿지 템플릿</title>
  <link rel="stylesheet" href="./styles/tokens.css" />
  <link rel="stylesheet" href="./styles/templates.css" />
</head>
<body>
  <div class="shell shell-bridge">
    <header class="page-header">
      <div>
        <p class="eyebrow">WOORI BRIDGE TEMPLATE</p>
        <h1 class="page-title">브릿지 공통 템플릿</h1>
      </div>
      <div class="channel-badge channel-badge-bridge">HITL Bridge</div>
    </header>
    <main class="bridge-layout">
      <section class="step-flow">
        <div class="step-item step-done">요청 수신</div>
        <div class="step-arrow">→</div>
        <div class="step-item step-active">근거 검토</div>
        <div class="step-arrow">→</div>
        <div class="step-item">수정 반영</div>
      </section>
      <section class="bridge-body">
        <article class="panel">
          <div class="panel-head"><h2>검토 목록</h2><span class="head-meta">좌측 내비게이션</span></div>
          <div class="panel-body stack-list">
            <div class="queue-item is-active"><strong>검토 항목 1</strong><span class="status-chip status-chip-run">진행 중</span></div>
            <div class="queue-item"><strong>검토 항목 2</strong><span class="status-chip">대기</span></div>
          </div>
        </article>
        <article class="panel evidence-paper">
          <div class="panel-head"><h2>근거 문서</h2><span class="head-meta">중앙 증빙 영역</span></div>
          <div class="panel-body">
            <div class="paper-block">
              <div class="paper-line"><span>필드명</span><strong>추출값</strong></div>
              <div class="paper-line is-hit"><span>강조 필드</span><strong>수정 필요</strong></div>
            </div>
          </div>
        </article>
        <aside class="panel">
          <div class="panel-head"><h2>검토 액션</h2><span class="status-chip status-chip-warn">승인 필요</span></div>
          <div class="panel-body review-form">
            <div class="review-callout"><strong>설계 원칙</strong><p>브릿지는 근거, 판단, 반영 액션이 한 화면에서 닫히도록 구성합니다.</p></div>
            <button class="btn btn-secondary" type="button">보완 요청</button>
            <button class="btn btn-primary" type="button">수정 반영</button>
          </div>
        </aside>
      </section>
    </main>
  </div>
</body>
</html>
