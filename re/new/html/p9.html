<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>P9 대사/검증</title>
  <style>
    :root{
      --bg:#edf0f3;
      --card:#f3f5f7;
      --line:#bbbbbb;
      --text:#1f2937;
      --muted:#66768a;
      --primary:#0067b1;
      --primary-soft:#e8f2fb;
      --ok:#1f9d55;
      --warn:#b45309;
      --danger:#b91c1c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:#ffffff;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:"Malgun Gothic","Segoe UI",sans-serif;
      color:var(--text);
    }
    .app-shell{
      width:1280px;
      height:720px;
      background:var(--bg);
      border:1px solid #d4dae2;
      border-radius:12px;
      box-shadow:0 10px 28px rgba(15,23,42,.14);
      overflow:hidden;
    }
    .header{
      height:64px;
      background:#eceff3;
      border-bottom:2px solid var(--primary);
      padding:12px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .title-group{display:flex;align-items:center;gap:10px}
    .title{font-size:24px;font-weight:800;line-height:1}
    .meta{
      font-size:16px;
      color:#4b5563;
      font-weight:700;
      border:1px solid #d6dde6;
      background:#f4f6f8;
      border-radius:999px;
      padding:5px 10px;
    }
    .run-badge{
      display:flex;
      align-items:center;
      color:#374151;
      background:#ffffff;
      border:2px solid #0067b1;
      border-radius:0;
      padding:6px 12px;
      font-size:16px;
      font-weight:800;
      letter-spacing:.15px;
      user-select:none;
      cursor:default;
    }
    .content{
      height:656px;
      padding:10px;
      display:grid;
      grid-template-rows:62px 1fr;
      gap:6px;
      background:#bbbbbb;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:10px;
      overflow:hidden;
    }
    .flow{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      height:100%;
      padding:6px 8px;
      background:#e7ebf0;
    }
    .step{
      min-width:142px;
      border:1px solid #b8c2cf;
      border-radius:8px;
      padding:7px 9px;
      background:#f8fafc;
      text-align:center;
      font-size:14px;
      color:#475569;
      font-weight:800;
    }
    .step.active{
      color:var(--primary);
      border-color:#7ab3df;
      background:var(--primary-soft);
    }
    .step.active.prep{
      color:#17663c;
      border-color:#86efac;
      background:#f0fdf4;
      animation:activePrepBlink 1s ease-in-out infinite;
    }
    .step.done{
      color:var(--primary);
      border-color:#7ab3df;
      background:var(--primary-soft);
    }
    @keyframes activePrepBlink{
      0%,100%{box-shadow:0 0 0 0 rgba(31,157,85,0)}
      50%{box-shadow:0 0 0 6px rgba(31,157,85,.16)}
    }
    .arrow{color:#7f8ea3;font-size:16px;line-height:1}
    .main{min-height:0}
    .main>.card{min-height:0;height:100%;display:flex;flex-direction:column}
    .box-h{
      padding:10px 12px;
      border-bottom:1px solid #c9d2dd;
      font-size:15px;
      font-weight:800;
      color:#1f2937;
      background:#dfe5ec;
    }
    .box-b{
      padding:8px;
      flex:1;
      min-height:0;
      background:#f4f6f9;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .extract-table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      background:#fff;
      border:1px solid #cfd7e1;
      border-radius:10px;
      overflow:hidden;
      font-size:14px;
    }
    .extract-table th{
      background:#e7edf4;
      color:#334155;
      font-weight:800;
      border-bottom:1px solid #c7d1dd;
      border-right:1px solid #d6dee8;
      padding:9px 8px;
      text-align:left;
    }
    .extract-table th:last-child{border-right:0}
    .extract-table td{
      border-bottom:1px solid #e2e8f0;
      border-right:1px solid #eef2f7;
      padding:9px 8px;
      color:#1f2937;
      vertical-align:middle;
    }
    .extract-table tr:last-child td{border-bottom:0}
    .extract-table td:last-child{border-right:0}
    .doc-name{font-weight:700;color:#334155}
    .field-name{color:#475569;font-weight:700}
    .state{
      border-radius:999px;
      padding:4px 9px;
      font-size:12px;
      font-weight:800;
      border:1px solid var(--line);
      color:#475569;
      background:#eceff3;
    }
    .state.run{
      color:var(--primary);
      border-color:#93c5fd;
      background:#eff6ff;
    }
    .state.done{
      color:#17663c;
      border-color:#86efac;
      background:#f0fdf4;
    }
    .state.final-done{
      color:#0067b1;
      border-color:#93c5fd;
      background:#eff6ff;
    }
    .blink{animation:blinkPulse .8s ease-in-out 2}
    @keyframes blinkPulse{
      0%,100%{box-shadow:0 0 0 0 rgba(0,103,177,0)}
      50%{box-shadow:0 0 0 6px rgba(0,103,177,.12)}
    }
    .tool-area{
      margin-top:14px;
      padding:10px;
      border:1px solid #cfd7e1;
      border-radius:10px;
      background:#ffffff;
      display:none;
    }
    .tool-area.show{display:block}
    .tool-row{
      display:grid;
      grid-template-columns:220px 150px 1fr;
      align-items:center;
      gap:10px;
    }
    .tool-label{
      font-size:14px;
      font-weight:800;
      color:#334155;
    }
    .tool-status{
      font-size:13px;
      font-weight:800;
      color:#0b5d99;
    }
    .tool-status.done{color:#17663c}
    .tool-track{
      height:16px;
      border:1px solid #c7d2df;
      background:#eef2f7;
      border-radius:999px;
      overflow:hidden;
    }
    .tool-fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#60a5fa,#0067b1);
      transition:width .15s linear;
    }
    .send-line{
      margin-top:12px;
      padding-top:10px;
      border-top:1px dashed #d9e1ea;
      font-size:14px;
      font-weight:800;
      color:#475569;
      display:none;
    }
    .send-line.show{display:block}
    .send-line.done{
      color:#17663c;
      animation:sendDoneBlink .9s ease-in-out 3;
    }
    @keyframes sendDoneBlink{
      0%,100%{opacity:1}
      50%{opacity:.25}
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <div class="title-group">
        <div class="title">대사/검증</div>
        <div class="meta">Agent</div>
      </div>
      <div class="run-badge">백그라운드 실행</div>
    </div>

    <div class="content">
      <section class="card">
        <div class="flow">
          <div class="step done">실행 계획 수립</div>
          <div class="arrow">→</div>
          <div class="step done">문서 전처리</div>
          <div class="arrow">→</div>
          <div class="step done">진위검증</div>
          <div class="arrow">→</div>
          <div class="step done">AI-OCR 및 필드 추출</div>
          <div class="arrow">→</div>
          <div class="step active prep" id="activeFlowStep">대사/검증</div>
        </div>
      </section>

      <section class="main">
        <article class="card">
          <div class="box-h">대사/검증 실행</div>
          <div class="box-b">
            <table class="extract-table" aria-label="대사/검증 실행 목록">
              <thead>
                <tr>
                  <th style="width:170px">문서명</th>
                  <th style="width:130px">입력값 대사</th>
                  <th style="width:130px">문서간 대사</th>
                  <th style="width:140px">필수값 누락 검증</th>
                  <th style="width:115px">타입 검증</th>
                  <th style="width:115px">유효값 검증</th>
                  <th style="width:130px">KYC 교차검증</th>
                  <th style="width:110px">최종 판정</th>
                </tr>
              </thead>
              <tbody>
                <tr data-row="0">
                  <td class="doc-name">사업자등록증명원.pdf</td>
                  <td><span class="state verify-state" data-stage="input">대기</span></td>
                  <td><span class="state verify-state" data-stage="crossdoc">대기</span></td>
                  <td><span class="state verify-state" data-stage="required">대기</span></td>
                  <td><span class="state verify-state" data-stage="type">대기</span></td>
                  <td><span class="state verify-state" data-stage="valid">대기</span></td>
                  <td><span class="state verify-state" data-stage="kyc">대기</span></td>
                  <td><span class="state final-state" data-stage="final">대기</span></td>
                </tr>
                <tr data-row="1">
                  <td class="doc-name">법인등기부등본.pdf</td>
                  <td><span class="state verify-state" data-stage="input">대기</span></td>
                  <td><span class="state verify-state" data-stage="crossdoc">대기</span></td>
                  <td><span class="state verify-state" data-stage="required">대기</span></td>
                  <td><span class="state verify-state" data-stage="type">대기</span></td>
                  <td><span class="state verify-state" data-stage="valid">대기</span></td>
                  <td><span class="state verify-state" data-stage="kyc">대기</span></td>
                  <td><span class="state final-state" data-stage="final">대기</span></td>
                </tr>
              </tbody>
            </table>
            <div class="tool-area" id="messageToolArea" aria-label="메세지 전송 Tool 실행 영역">
              <div class="tool-row">
                <div class="tool-label">메세지 전송 Tool</div>
                <div class="tool-status" id="toolStatus">로딩중 0%</div>
                <div class="tool-track"><div class="tool-fill" id="toolProgress"></div></div>
              </div>
              <div class="send-line" id="sendStatusLine">확인 메세지 전송중</div>
            </div>
          </div>
        </article>
      </section>
    </div>
  </div>

  <script src="./js/common.js"></script>
  <script>
    const rows = Array.from(document.querySelectorAll("tbody tr[data-row]"));
    const activeFlowStep = document.getElementById("activeFlowStep");
    const messageToolArea = document.getElementById("messageToolArea");
    const toolStatus = document.getElementById("toolStatus");
    const toolProgress = document.getElementById("toolProgress");
    const sendStatusLine = document.getElementById("sendStatusLine");

    function getDoneLabel(stage){
      const compareStages = new Set(["input", "crossdoc"]);
      if(compareStages.has(stage)) return "일치";
      return "정상";
    }

    function setState(rowIdx, stage, state){
      const row = rows[rowIdx];
      if(!row) return;
      const item = row.querySelector(`.state[data-stage="${stage}"]`);
      if(!item) return;
      item.classList.remove("run", "done", "final-done", "blink");
      if(state === "run"){
        item.classList.add("run");
        item.textContent = "진행중";
      } else if(state === "done"){
        item.classList.add("done");
        item.textContent = getDoneLabel(stage);
        if(stage === "final") item.classList.add("final-done");
      } else {
        item.textContent = "대기";
      }
      item.classList.add("blink");
      setTimeout(() => item.classList.remove("blink"), 1100);
    }

    function wait(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function stagedProgress(t){
      const points = [
        { t: 0.00, p: 0 },
        { t: 0.22, p: 16 },
        { t: 0.40, p: 39 },
        { t: 0.58, p: 57 },
        { t: 0.74, p: 77 },
        { t: 0.88, p: 90 },
        { t: 0.96, p: 96 },
        { t: 1.00, p: 100 }
      ];
      for(let i = 0; i < points.length - 1; i++){
        const a = points[i];
        const b = points[i + 1];
        if(t >= a.t && t <= b.t){
          const local = (t - a.t) / (b.t - a.t || 1);
          const eased = 1 - Math.pow(1 - local, 2);
          return a.p + (b.p - a.p) * eased;
        }
      }
      return 100;
    }

    async function runMessageToolSequence(){
      messageToolArea.classList.add("show");
      toolStatus.textContent = "로딩중 0%";
      toolStatus.classList.remove("done");
      toolProgress.style.width = "0%";
      sendStatusLine.classList.remove("show", "done");

      const duration = 2000;
      const started = performance.now();
      let rendered = 0;
      while(true){
        const elapsed = performance.now() - started;
        const t = Math.min(elapsed / duration, 1);
        let target = stagedProgress(t);
        if(t < 0.97){
          target = Math.min(99, target + Math.random() * 1.2);
        }
        rendered = Math.max(rendered, target);
        const percent = Math.min(99, Math.floor(rendered));
        toolProgress.style.width = `${percent}%`;
        toolStatus.textContent = `로딩중 ${percent}%`;
        if(t >= 1) break;
        await wait(80 + Math.random() * 120);
      }

      toolProgress.style.width = "100%";
      toolStatus.textContent = "로딩 완료 100%";
      toolStatus.classList.add("done");

      await wait(350);
      sendStatusLine.classList.add("show");
      sendStatusLine.textContent = "확인 메세지 전송중";
      await wait(900);
      sendStatusLine.textContent = "전송완료";
      sendStatusLine.classList.add("done");
    }

    async function runRowPipeline(rowIdx, cfg){
      // 입력값 대사는 두 문서 동시 시작, 완료 시점만 다름
      await wait(cfg.input);
      setState(rowIdx, "input", "done");

      const stages = ["crossdoc", "required", "type", "valid", "kyc"];
      for(const stage of stages){
        setState(rowIdx, stage, "run");
        await wait(cfg[stage]);
        setState(rowIdx, stage, "done");
      }

      setState(rowIdx, "final", "run");
      await wait(cfg.final);
      setState(rowIdx, "final", "done");
    }

    async function runP9Animation(){
      await wait(500);

      // 입력값 대사 동시 시작
      setState(0, "input", "run");
      setState(1, "input", "run");

      const rowConfigs = [
        { input:1200, crossdoc:900, required:540, type:1250, valid:760, kyc:1380, final:820 },
        { input:400,  crossdoc:1450, required:680, type:960,  valid:1320, kyc:560,  final:1080 }
      ];

      await Promise.all(rows.map((_, idx) => runRowPipeline(idx, rowConfigs[idx])));
      activeFlowStep.classList.remove("prep");
      await runMessageToolSequence();
    }

    window.addEventListener("load", () => {
      runP9Animation().then(() => {
        window.WBAutoPaging?.moveToNextIfEnabled?.(700);
      });
    });
  </script>
</body>
</html>
