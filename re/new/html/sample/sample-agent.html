<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sample - Agent 템플릿</title>
  <style>
    :root{
      --bg:#eef3f8; --card:#fff; --line:#d6e0eb; --text:#1f2937; --muted:#607184;
      --primary:#0067b1; --primary-soft:#e8f2fb; --ok:#1f9d55;
    }
    *{box-sizing:border-box}
    body{margin:0; background:#0b1220; display:grid; place-items:center; min-height:100vh; font-family:"Malgun Gothic","Segoe UI",sans-serif;}
    .app-shell{width:1280px;height:720px;background:var(--bg);overflow:hidden;border:1px solid #0f172a}
    .header{height:64px;background:#fff;border-bottom:2px solid var(--primary);padding:12px 18px}
    .title{font-size:19px;font-weight:700;color:var(--text)}
    .subtitle{font-size:12px;color:var(--muted);margin-top:3px}
    .content{height:656px;padding:12px;display:grid;grid-template-rows:62px 1fr;gap:10px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:10px}
    .flow{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 10px;height:100%}
    .step{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--muted);text-align:center;background:#fff;min-width:142px}
    .step.active{background:var(--primary-soft);border-color:#7ab3df;color:var(--primary);font-weight:700}
    .arrow{font-size:16px;color:#8fa2b7;line-height:1}
    .grid{display:grid;grid-template-columns:1fr;gap:10px;height:100%}
    .boxh{padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px;font-weight:700}
    .body{padding:12px}
    .timeline .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px}
    .pill{padding:3px 8px;border-radius:999px;border:1px solid var(--line);font-size:11px}
    .run{background:rgba(0,103,177,.12);color:var(--primary);border-color:rgba(0,103,177,.32)}
    .done{background:rgba(31,157,85,.12);color:#17663c;border-color:rgba(31,157,85,.35)}
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <div class="title">Agent 템플릿 샘플 - P4 문서 전처리</div>
      <div class="subtitle">상단 전체 흐름 + 하단 현재 단계 진행 시각화</div>
    </div>
    <div class="content">
      <section class="card">
        <div class="flow">
          <div class="step">P3 계획 수립</div>
          <div class="arrow">→</div>
          <div class="step active">P4 문서 전처리</div>
          <div class="arrow">→</div>
          <div class="step">P5 진위검증</div>
          <div class="arrow">→</div>
          <div class="step">P6 OCR 추출</div>
          <div class="arrow">→</div>
          <div class="step">P9 대사/검증</div>
          <div class="arrow">→</div>
          <div class="step">P10 완료 알림</div>
        </div>
      </section>
      <section class="grid">
        <div class="card">
          <div class="boxh">현재 프로세스 진행상태</div>
          <div class="body timeline">
            <div class="row"><span>기울기 보정</span><span class="pill done">완료</span></div>
            <div class="row"><span>노이즈 제거</span><span class="pill done">완료</span></div>
            <div class="row"><span>명암/대비 보정</span><span class="pill run">진행중</span></div>
            <div class="row"><span>페이지 정렬</span><span class="pill">대기</span></div>
            <div class="row"><span>전처리 산출물 저장</span><span class="pill">대기</span></div>
          </div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
