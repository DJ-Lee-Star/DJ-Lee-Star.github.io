<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sample - 브릿지 미니 템플릿</title>
  <style>
    :root{--bg:#eef3f8; --line:#d6e0eb; --text:#1f2937; --muted:#607184; --primary:#0067b1; --warn:#dc2626;}
    *{box-sizing:border-box}
    body{margin:0;background:#0b1220;display:grid;place-items:center;min-height:100vh;font-family:"Malgun Gothic","Segoe UI",sans-serif}
    .app-shell{width:1280px;height:720px;background:var(--bg);overflow:hidden;position:relative;border:1px solid #0f172a}
    .header{height:64px;background:#fff;border-bottom:2px solid var(--primary);padding:12px 18px}
    .title{font-size:19px;font-weight:700;color:var(--text)}
    .subtitle{font-size:12px;color:var(--muted);margin-top:3px}
    .content{height:656px;padding:14px;color:#94a3b8;font-size:14px}
    .mini{
      position:absolute; right:18px; bottom:18px; width:360px;
      border:1px solid rgba(0,103,177,.35); background:#ffffff; border-radius:12px;
      box-shadow:0 12px 28px rgba(2,8,23,.22); overflow:hidden;
    }
    .mini-h{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
    .badge{font-size:11px;color:#fff;background:var(--warn);padding:3px 7px;border-radius:999px}
    .mini-b{padding:12px}
    .k{font-size:12px;color:var(--muted)}
    .v{margin-top:5px;font-size:13px;color:var(--text);line-height:1.45}
    .act{margin-top:10px;font-size:12px;color:var(--primary);font-weight:700}
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <div class="title">브릿지 미니 템플릿 샘플</div>
      <div class="subtitle">메인 화면 우측 하단 이벤트성 알림 오버레이</div>
    </div>
    <div class="content">메인 화면 캔버스(예시)</div>
    <div class="mini">
      <div class="mini-h">
        <strong style="font-size:13px;color:#0f172a">새 메시지</strong>
        <span class="badge">오류</span>
      </div>
      <div class="mini-b">
        <div class="k">P7 오류 알림</div>
        <div class="v">소득금액증명원 OCR 실패 1건 발생. 재시도 또는 수동확인 필요.</div>
        <div class="act">브릿지 열기</div>
      </div>
    </div>
  </div>
</body>
</html>
