<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="./images/favicon.png" />
  <title>P1 신청정보 입력</title>
  <link href="./fonts/fonts.css" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════
       TYPE 1 — 영업점 단말 · Classic Banking Premium
       ═══════════════════════════════════════════════ */

    :root{
      /* — Surface — */
      --bg:          #EDE9E2;
      --bg-warm:     #F5F3EF;
      --card:        #FFFFFF;
      --card-alt:    #FAFAF8;

      /* — Border — */
      --line:        #D4CFC6;
      --line-soft:   #E4E0D8;
      --line-focus:  #3a8dfd;

      /* — Text — */
      --text:        #1A1816;
      --text-sub:    #52504B;
      --text-muted:  #98938A;

      /* — Brand — */
      --wb-deep:     #0a1f4a;
      --wb-dark:     #1a3c7a;
      --wb-mid:      #2b6ad0;
      --wb-blue:     #3a8dfd;
      --wb-light:    #5ea3fd;
      --wb-soft:     #e8f1ff;
      --wb-glow:     rgba(58,141,253,0.14);

      /* — Accent — */
      --gold:        #B8975A;
      --gold-light:  #D4B978;
      --gold-soft:   #F2EBDC;

      /* — Depth — */
      --shadow-s:    0 1px 3px rgba(26,24,22,0.05), 0 0 0 1px rgba(26,24,22,0.03);
      --shadow-m:    0 4px 14px rgba(26,24,22,0.08), 0 1px 3px rgba(26,24,22,0.05);
      --shadow-l:    0 12px 36px rgba(0,20,40,0.13), 0 2px 8px rgba(0,20,40,0.06);
      --shadow-xl:   0 24px 48px rgba(0,20,40,0.20), 0 4px 12px rgba(0,20,40,0.07);

      /* — Radius — */
      --r-sm:  6px;
      --r-md:  10px;
      --r-lg:  14px;

      /* — Motion — */
      --ease:  0.2s ease;
      --ease-out: 0.32s cubic-bezier(0.16,1,0.3,1);
    }

    /* ─── Reset ─── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    body{
      background: var(--bg);
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      color:var(--text);
      -webkit-font-smoothing:antialiased;
    }

    /* ─── App Shell ─── */
    .app-shell{
      width:1280px;
      height:720px;
      background:var(--bg-warm);
      border-radius:var(--r-lg);
      box-shadow:var(--shadow-l), 0 0 0 1px rgba(0,0,0,0.03);
      overflow:hidden;
      position:relative;
    }

    /* ─── Header ─── */
    .header{
      height:64px;
      background:#3a8dfd;
      padding:0 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:relative;
      z-index:2;
    }
    .header::after{display:none;}
    /* 헤더 미세 패턴 오버레이 */
    .header::before{
      content:'';
      position:absolute;
      inset:0;
      background:repeating-linear-gradient(
        90deg,
        transparent,
        transparent 120px,
        rgba(255,255,255,0.015) 120px,
        rgba(255,255,255,0.015) 121px
      );
      pointer-events:none;
    }

    .header-left{
      display:flex;
      align-items:center;
      gap:10px;
      position:relative;
      z-index:1;
    }
    .header-logo{
      height:28px;
      width:auto;
      object-fit:contain;
      margin-right:4px;
    }
    .header-divider{
      width:1px;
      height:20px;
      background:rgba(255,255,255,0.35);
      margin:0 4px;
    }
    .title{
      font-size:22px;
      font-weight:800;
      color:#FFFFFF;
      letter-spacing:-0.4px;
      text-shadow:0 1px 3px rgba(0,0,0,0.18);
    }

    .terminal-badge{
      display:flex;
      align-items:center;
      gap:7px;
      color:rgba(255,255,255,0.95);
      background:rgba(255,255,255,0.10);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.22);
      border-radius:var(--r-sm);
      padding:7px 14px;
      font-size:13px;
      font-weight:700;
      letter-spacing:0.6px;
      user-select:none;
      cursor:default;
    }
    .terminal-badge::before{
      content:'';
      width:7px; height:7px;
      background:#6EE7B7;
      border-radius:50%;
      box-shadow:0 0 6px rgba(110,231,183,0.5);
    }

    /* ─── Top Menu ─── */
    .top-menu{
      height:42px;
      background:var(--card);
      border-bottom:1px solid var(--line-soft);
      display:flex;
      align-items:center;
      padding:0 20px;
      gap:2px;
    }
    .top-menu-item{
      display:flex;
      align-items:center;
      gap:6px;
      padding:8px 16px;
      font-size:13px;
      font-weight:700;
      color:var(--text-sub);
      text-decoration:none;
      border-radius:var(--r-sm);
      cursor:pointer;
      transition:all var(--ease);
    }
    .top-menu-item:hover{
      background:var(--card-alt);
      color:var(--text);
    }
    .top-menu-item.active{
      color:var(--wb-blue);
      background:var(--wb-soft);
    }
    .tm-icon{width:18px;height:18px;flex-shrink:0}

    /* ─── Content ─── */
    .content{
      height:614px;
      padding:16px 20px;
      display:grid;
      grid-template-columns:210px 1fr;
      gap:12px;
    }

    /* ─── Tree Sidebar ─── */
    .tree-sidebar{
      background:var(--card);
      border:1px solid var(--line-soft);
      border-radius:var(--r-md);
      box-shadow:var(--shadow-s);
      padding:0;
      overflow-y:auto;
      font-size:13px;
      user-select:none;
    }
    .tree-sidebar::-webkit-scrollbar{width:5px}
    .tree-sidebar::-webkit-scrollbar-track{background:transparent}
    .tree-sidebar::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
    .tree-header{
      padding:12px 14px 10px;
      font-size:11px;
      font-weight:800;
      color:var(--text-muted);
      letter-spacing:1px;
      border-bottom:1px solid var(--line-soft);
    }
    [class^="tree-lv"]{
      display:block;
      padding:7px 14px;
      color:var(--text-sub);
      cursor:pointer;
      transition:background var(--ease), color var(--ease);
      text-decoration:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tree-lv0{padding-left:14px;font-weight:700;color:var(--text);font-size:13px}
    .tree-lv1{padding-left:30px;font-weight:600;font-size:13px}
    .tree-lv2{padding-left:44px;font-weight:600;font-size:12px}
    .tree-lv3{padding-left:56px;font-weight:500;font-size:12px}
    [class^="tree-lv"]:hover{background:var(--card-alt)}
    .tree-ic{
      display:inline-block;
      width:14px;
      font-size:10px;
      color:var(--text-muted);
      text-align:center;
      margin-right:4px;
    }
    a[class^="tree-lv"].active{
      background:var(--wb-soft);
      color:var(--wb-blue);
      font-weight:700;
      border-right:3px solid var(--wb-blue);
    }

    /* ─── Panel ─── */
    .panel{
      background:var(--card);
      border:1px solid var(--line-soft);
      border-radius:var(--r-md);
      box-shadow:var(--shadow-s);
      overflow:hidden;
      height:100%;
      display:flex;
      flex-direction:column;
    }
    .panel-b{
      padding:16px 22px 0;
      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    /* ─── Section Header ─── */
    .section-bar{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:14px;
      padding-bottom:12px;
      border-bottom:1px solid var(--line-soft);
    }
    .section-title{
      font-size:16px;
      font-weight:800;
      color:var(--text);
      letter-spacing:-0.3px;
    }
    .section-sub{
      font-size:12px;
      font-weight:600;
      color:var(--text-muted);
      margin-left:auto;
    }

    /* ─── Form ─── */
    .form{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px 14px;
    }
    .field label{
      display:block;
      margin-bottom:2px;
      font-size:12px;
      font-weight:700;
      color:var(--text-sub);
      letter-spacing:0.15px;
    }
    .field input,.field select{
      width:100%;
      height:36px;
      border:1px solid var(--line);
      border-radius:var(--r-sm);
      padding:0 12px;
      font-size:15px;
      font-family:inherit;
      font-weight:500;
      color:var(--text);
      background:var(--card-alt);
      outline:none;
      transition:border-color var(--ease), box-shadow var(--ease), background var(--ease);
    }
    .field input:focus,.field select:focus{
      border-color:var(--line-focus);
      background:#FFFFFF;
      box-shadow:0 0 0 3px var(--wb-glow);
    }
    .field select{
      appearance:none;
      background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2398938A' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat:no-repeat;
      background-position:right 12px center;
      padding-right:30px;
      cursor:pointer;
    }

    .input-group{
      display:grid;
      grid-template-columns:1fr 50px;
      gap:6px;
      align-items:end;
    }
    .icon-btn{
      width:50px;
      height:36px;
      border:1px solid var(--line);
      border-radius:var(--r-sm);
      background:linear-gradient(180deg,#FAFAF8 0%,var(--bg-warm) 100%);
      color:var(--text-sub);
      font-size:12px;
      font-family:inherit;
      font-weight:700;
      box-shadow:0 1px 2px rgba(0,0,0,0.04);
      cursor:pointer;
      transition:all var(--ease);
    }
    .icon-btn:hover{
      border-color:var(--wb-blue);
      color:var(--wb-blue);
      background:linear-gradient(180deg,#f0f5ff 0%,var(--wb-soft) 100%);
    }
    .icon-btn:active{transform:translateY(1px)}
    .field.full{grid-column:1/3}

    /* ─── Form Groups ─── */
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:10px}
    .form-group{margin-bottom:10px}
    .form-row .form-group{margin-bottom:0}
    .form-row+.form-group{margin-top:20px}
    .group-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-0.2px}
    .form-row .form{grid-template-columns:1fr}
    .form-scroll{flex:1;overflow-y:auto;padding-right:2px;min-height:0}
    .form-scroll::-webkit-scrollbar{width:5px}
    .form-scroll::-webkit-scrollbar-track{background:transparent}
    .form-scroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

    /* ─── Action Buttons ─── */
    .actions{
      padding:10px 0 14px;
      display:flex;
      gap:8px;
      justify-content:flex-end;
      border-top:1px solid var(--line-soft);
      background:var(--card);
      flex-shrink:0;
    }
    .btn{
      border:1px solid var(--line);
      background:var(--card);
      border-radius:var(--r-sm);
      padding:10px 18px;
      font-size:14px;
      font-family:inherit;
      font-weight:700;
      cursor:pointer;
      transition:all var(--ease);
    }
    .btn:hover{
      border-color:#C0B8AC;
      background:#F6F4F0;
    }
    .btn.primary{
      color:#FFFFFF;
      border:none;
      background:#3a8dfd;
      box-shadow:0 2px 8px rgba(58,141,253,0.28);
      padding:11px 24px;
      letter-spacing:0.2px;
    }
    .btn.primary:hover{
      background:#2b7ce8;
      box-shadow:0 4px 14px rgba(58,141,253,0.32);
      transform:translateY(-1px);
    }
    .btn.primary:active{transform:translateY(0)}

    /* ─── Modal Overlay ─── */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,20,40,0.38);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:100;
    }
    .overlay.show{display:flex}

    .modal{
      width:620px;
      max-height:520px;
      background:var(--card);
      border:1px solid var(--line-soft);
      border-radius:var(--r-lg);
      box-shadow:var(--shadow-xl);
      overflow:hidden;
      animation:modalIn .3s var(--ease-out);
    }
    @keyframes modalIn{
      from{opacity:0;transform:translateY(20px) scale(0.98)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }
    .modal-h{
      padding:14px 18px;
      border-bottom:1px solid var(--line-soft);
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:var(--card-alt);
    }
    .modal-title{
      font-size:16px;
      font-weight:800;
      color:var(--text);
      letter-spacing:-0.2px;
    }
    .close-btn{
      border:1px solid var(--line);
      background:var(--card);
      border-radius:var(--r-sm);
      width:32px;height:32px;
      font-size:13px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--text-muted);
      transition:all var(--ease);
    }
    .close-btn:hover{
      border-color:#C0B8AC;
      color:var(--text);
      background:#F4F2EE;
    }
    .modal-b{padding:14px 18px}

    /* ─── Search ─── */
    .search{
      display:grid;
      grid-template-columns:1fr 84px;
      gap:8px;
      margin-bottom:12px;
    }
    .search input{
      border:1px solid var(--line);
      border-radius:var(--r-sm);
      padding:10px 12px;
      font-size:14px;
      font-family:inherit;
      outline:none;
      transition:border-color var(--ease),box-shadow var(--ease);
    }
    .search input:focus{
      border-color:var(--wb-blue);
      box-shadow:0 0 0 3px var(--wb-glow);
    }
    .search button{
      border:1px solid var(--line);
      border-radius:var(--r-sm);
      background:linear-gradient(180deg,#FAFAF8 0%,var(--bg-warm) 100%);
      font-size:14px;
      font-family:inherit;
      font-weight:700;
      color:var(--text-sub);
      cursor:pointer;
      transition:all var(--ease);
    }
    .search button:hover{
      border-color:var(--wb-blue);
      color:var(--wb-blue);
    }

    /* ─── Lookup List ─── */
    .list{
      border:1px solid var(--line-soft);
      border-radius:var(--r-md);
      max-height:300px;
      overflow:auto;
    }
    .list::-webkit-scrollbar{width:6px}
    .list::-webkit-scrollbar-track{background:transparent}
    .list::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
    .list-head{
      display:grid;
      gap:0;
      border-bottom:1px solid var(--line);
      background:#F6F4F0;
      font-size:12px;
      font-weight:700;
      color:var(--text-sub);
      position:sticky;
      top:0;
      z-index:1;
    }
    .list-head div{
      padding:10px 14px;
      border-right:1px solid var(--line-soft);
    }
    .list-head div:last-child{border-right:0}
    .list-head.branch{grid-template-columns:120px 1fr}
    .list-head.manager{grid-template-columns:120px 140px 1fr}
    .row{
      width:100%;
      border:0;
      border-bottom:1px solid var(--line-soft);
      background:var(--card);
      text-align:left;
      padding:11px 14px;
      cursor:pointer;
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:14px;
      font-family:inherit;
      color:var(--text);
      transition:background var(--ease);
    }
    .row.branch{display:grid;grid-template-columns:120px 1fr;gap:0}
    .row.manager{display:grid;grid-template-columns:120px 140px 1fr;gap:0}
    .row span{padding:0 14px;border-right:1px solid var(--line-soft)}
    .row span:last-child{border-right:0}
    .row:hover{background:var(--wb-soft)}
    .row:last-child{border-bottom:0}
    .modal-f{
      padding:12px 18px;
      border-top:1px solid var(--line-soft);
      display:flex;
      justify-content:flex-end;
      gap:8px;
      background:var(--card-alt);
    }
    .fbtn{
      border:1px solid var(--line);
      background:var(--card);
      border-radius:var(--r-sm);
      padding:8px 14px;
      font-size:13px;
      font-family:inherit;
      font-weight:700;
      cursor:pointer;
      transition:all var(--ease);
    }
    .fbtn:hover{
      border-color:#C0B8AC;
      background:#F4F2EE;
    }

    /* ─── Demo Effects ─── */
    .demo-click{
      box-shadow:0 0 0 2px rgba(0,86,160,0.26),0 0 0 7px rgba(0,86,160,0.10) !important;
      transition:box-shadow .18s ease;
    }
    .click-ripple{
      position:fixed;
      width:18px;height:18px;
      border:2px solid rgba(0,86,160,0.45);
      border-radius:50%;
      pointer-events:none;
      transform:translate(-50%,-50%) scale(.6);
      opacity:1;
      animation:ripple .45s ease-out forwards;
      z-index:999;
    }
    @keyframes ripple{
      to{transform:translate(-50%,-50%) scale(2.2);opacity:0}
    }

    /* ─── Select Demo Menu ─── */
    .select-demo-menu{
      position:fixed;
      min-width:180px;
      max-width:320px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r-md);
      box-shadow:var(--shadow-m);
      padding:4px;
      display:none;
      z-index:150;
      font-size:14px;
    }
    .select-demo-menu.show{display:block}
    .select-demo-item{
      padding:9px 12px;
      border-radius:var(--r-sm);
      color:var(--text);
      font-family:inherit;
      transition:background var(--ease);
    }
    .select-demo-item:hover{background:#F6F4F0}
    .select-demo-item.active{
      background:var(--wb-soft);
      color:var(--wb-blue);
      font-weight:700;
    }

    /* ─── Badge ─── */
    .badge{
      font-size:11px;
      color:var(--wb-blue);
      background:var(--wb-soft);
      border:1px solid #C2D9EC;
      border-radius:999px;
      padding:3px 10px;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <div class="header-left">
        <img class="header-logo" src="./images/logo.png" alt="logo">
        <div class="header-divider"></div>
        <div class="title">신청정보 입력</div>
      </div>
      <div class="terminal-badge">영업점 단말</div>
    </div>

    <nav class="top-menu">
      <a class="top-menu-item active"><svg class="tm-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="1" width="12" height="16" rx="2"/><path d="M7 5h4M7 8h4M7 11h2"/></svg>여신</a>
      <a class="top-menu-item"><svg class="tm-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 16h14M3 7h12L9 2 3 7zM5 7v7M9 7v7M13 7v7"/></svg>수신</a>
      <a class="top-menu-item"><svg class="tm-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="7"/><path d="M2 9h14M9 2c2 2 3 4.5 3 7s-1 5-3 7M9 2c-2 2-3 4.5-3 7s1 5 3 7"/></svg>외환</a>
      <a class="top-menu-item"><svg class="tm-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="5" r="3"/><path d="M3 16c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>고객</a>
      <a class="top-menu-item"><svg class="tm-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 14l4-5 3 3 5-7M2 16h14"/></svg>자금</a>
      <a class="top-menu-item"><svg class="tm-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="14" height="10" rx="2"/><path d="M6 16h6M9 12v4"/></svg>전자금융</a>
      <a class="top-menu-item"><svg class="tm-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="9" r="3"/><path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.3 3.3l1.4 1.4M13.3 13.3l1.4 1.4M3.3 14.7l1.4-1.4M13.3 4.7l1.4-1.4"/></svg>관리</a>
    </nav>

    <div class="content">

  <!-- ─── Lookup Modal ─── -->
  <div class="overlay" id="lookupOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="lookupTitle">
      <div class="modal-h">
        <div class="modal-title" id="lookupTitle">조회</div>
        <button class="close-btn" id="closeLookup" type="button" aria-label="닫기">✕</button>
      </div>
      <div class="modal-b">
        <div class="search">
          <input id="lookupQuery" placeholder="검색어 입력" />
          <button id="searchBtn" type="button">검색</button>
        </div>
        <div class="list" id="lookupList"></div>
      </div>

        <button class="fbtn" id="cancelLookup" type="button">취소</button>

  <!-- ─── Select Demo Menu ─── -->
  <div class="select-demo-menu" id="selectDemoMenu" aria-hidden="true"></div>

  <script src="./js/common.js"></script>
  <script>
    const branchData = [
      { code: "411", name: "강남기업금융센터" },
      { code: "238", name: "서초금융센터" },
      { code: "105", name: "종로금융센터" },
      { code: "522", name: "여의도금융센터" }
    ];

    const managerData = [
      { id: "E1042", name: "김담당", branch: "강남기업금융센터" },
      { id: "E0915", name: "이심사", branch: "서초금융센터" },
      { id: "E1130", name: "박영업", branch: "여의도금융센터" },
      { id: "E0873", name: "최담당", branch: "종로금융센터" }
    ];

    const overlay = document.getElementById("lookupOverlay");
    const lookupTitle = document.getElementById("lookupTitle");
    const lookupQuery = document.getElementById("lookupQuery");
    const lookupList = document.getElementById("lookupList");
    const closeLookup = document.getElementById("closeLookup");
    const cancelLookup = document.getElementById("cancelLookup");
    const searchBtn = document.getElementById("searchBtn");
    const branchCode = document.getElementById("branchCode");
    const managerName = document.getElementById("managerName");

    let currentType = null;

    function clickPulse(target){
      if(!target) return;
      const rect = target.getBoundingClientRect();
      const ripple = document.createElement("div");
      ripple.className = "click-ripple";
      ripple.style.left = `${rect.left + rect.width / 2}px`;
      ripple.style.top = `${rect.top + rect.height / 2}px`;
      document.body.appendChild(ripple);
      target.classList.add("demo-click");
      setTimeout(() => target.classList.remove("demo-click"), 220);
      setTimeout(() => ripple.remove(), 500);
    }

    function renderList(items, type){
      lookupList.innerHTML = "";
      const head = document.createElement("div");
      head.className = `list-head ${type}`;
      if(type === "branch"){
        head.innerHTML = "<div>영업점 코드</div><div>영업점명</div>";
      } else {
        head.innerHTML = "<div>사번</div><div>담당자</div><div>영업점명</div>";
      }
      lookupList.appendChild(head);

      items.forEach(item => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `row ${type}`;
        if(type === "branch"){
          btn.innerHTML = `<span>${item.code}</span><span>${item.name}</span>`;
          btn.addEventListener("click", () => {
            clickPulse(btn);
            branchCode.value = item.code;
            closeModal();
          });
        } else {
          btn.innerHTML = `<span>${item.id}</span><span>${item.name}</span><span>${item.branch}</span>`;
          btn.addEventListener("click", () => {
            clickPulse(btn);
            managerName.value = item.name;
            closeModal();
          });
        }
        lookupList.appendChild(btn);
      });
    }

    function filterAndRender(){
      const q = lookupQuery.value.trim().toLowerCase();
      if(currentType === "branch"){
        const filtered = branchData.filter(x => (`${x.code} ${x.name}`).toLowerCase().includes(q));
        renderList(filtered, "branch");
      } else if(currentType === "manager"){
        const filtered = managerData.filter(x => (`${x.id} ${x.name} ${x.branch}`).toLowerCase().includes(q));
        renderList(filtered, "manager");
      }
    }

    function openModal(type){
      currentType = type;
      lookupTitle.textContent = type === "branch" ? "영업점 코드 조회" : "담당자 조회";
      lookupQuery.value = "";
      renderList(type === "branch" ? branchData : managerData, type);
      overlay.classList.add("show");
      overlay.setAttribute("aria-hidden", "false");
      lookupQuery.focus();
    }

    function closeModal(){
      overlay.classList.remove("show");
      overlay.setAttribute("aria-hidden", "true");
      currentType = null;
    }

    document.querySelectorAll(".icon-btn[data-popup]").forEach(btn => {
      btn.addEventListener("click", () => openModal(btn.dataset.popup));
    });

    closeLookup.addEventListener("click", closeModal);
    cancelLookup.addEventListener("click", closeModal);
    searchBtn.addEventListener("click", filterAndRender);
    lookupQuery.addEventListener("keydown", e => {
      if(e.key === "Enter") filterAndRender();
      if(e.key === "Escape") closeModal();
    });
    overlay.addEventListener("click", e => {
      if(e.target === overlay) closeModal();
    });

    const selectDemoMenu = document.getElementById("selectDemoMenu");
    const demoFields = {
      applicationNo: "CC411-2026-000123",
      bizRegNo: "120-86-12345",
      borrowerName: "(주)000바이오",
      ceoName: "홍길동",
      industry: "의약품 제조업",
      loanProduct: "기업운전일반자금대출",
      applyDate: "2026-03-05",
      loanAmount: "1,500,000,000",
      loanPeriod: "24개월",
      fundPurpose: "운전자금",
      collateralInfo: "서울 강남구 역삼동 123-45"
    };

    const DEMO_TIME_SCALE = 1.6;

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms * DEMO_TIME_SCALE));
    }

    async function typeValue(input, value, speed){
      clickPulse(input);
      input.focus();
      input.value = "";
      for(const ch of value){
        input.value += ch;
        await sleep(speed);
      }
      input.blur();
    }

    function showSelectMenu(selectEl){
      const options = Array.from(selectEl.options);
      const rect = selectEl.getBoundingClientRect();
      selectDemoMenu.innerHTML = "";
      options.forEach((option, idx) => {
        const item = document.createElement("div");
        item.className = "select-demo-item";
        item.dataset.idx = idx;
        item.textContent = option.textContent;
        if(idx === selectEl.selectedIndex){
          item.classList.add("active");
        }
        selectDemoMenu.appendChild(item);
      });
      selectDemoMenu.style.left = `${rect.left}px`;
      selectDemoMenu.style.top = `${Math.min(window.innerHeight - 220, rect.bottom + 4)}px`;
      selectDemoMenu.style.width = `${rect.width}px`;
      selectDemoMenu.classList.add("show");
      selectDemoMenu.setAttribute("aria-hidden", "false");
    }

    function hideSelectMenu(){
      selectDemoMenu.classList.remove("show");
      selectDemoMenu.setAttribute("aria-hidden", "true");
    }

    async function chooseSelect(selectEl, targetIndex){
      clickPulse(selectEl);
      showSelectMenu(selectEl);
      await sleep(150);
      const targetItem = selectDemoMenu.querySelector(`.select-demo-item[data-idx="${targetIndex}"]`);
      if(targetItem){
        clickPulse(targetItem);
        targetItem.classList.add("active");
      }
      await sleep(110);
      selectEl.selectedIndex = targetIndex;
      selectEl.dispatchEvent(new Event("change", { bubbles:true }));
      hideSelectMenu();
      await sleep(60);
    }

    async function chooseLookup(type){
      const btn = document.querySelector(`.icon-btn[data-popup="${type}"]`);
      clickPulse(btn);
      openModal(type);
      await sleep(420);
      const row = lookupList.querySelector(`.row.${type}`);
      if(row){
        clickPulse(row);
        await sleep(150);
        row.click();
      }
      await sleep(120);
    }

    function smoothScrollToBottom(el, duration){
      return new Promise(resolve => {
        const target = el.scrollHeight - el.clientHeight;
        const start = el.scrollTop;
        const distance = target - start;
        if(distance <= 0){ resolve(); return; }
        let startTime = null;
        function step(ts){
          if(!startTime) startTime = ts;
          const elapsed = ts - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const ease = progress < 0.5
            ? 2 * progress * progress
            : -1 + (4 - 2 * progress) * progress;
          el.scrollTop = start + distance * ease;
          if(progress < 1) requestAnimationFrame(step);
          else resolve();
        }
        requestAnimationFrame(step);
      });
    }

    function initEmptyState(){
      Object.keys(demoFields).forEach(id => {
        const input = document.getElementById(id);
        if(input) input.value = "";
      });
      branchCode.value = "";
      managerName.value = "";
      ["repaymentType", "handlingType", "collateralType", "applyChannel", "corpType", "rateType", "paymentCycle"].forEach(id => {
        const selectEl = document.getElementById(id);
        if(selectEl) selectEl.selectedIndex = 0;
      });
      hideSelectMenu();
      closeModal();
    }

    async function runDemoSequence(){
      initEmptyState();
      await sleep(220);

      /* ── 접수 정보 ── */
      await typeValue(document.getElementById("applicationNo"), demoFields.applicationNo, 30);
      await chooseLookup("manager");
      await chooseSelect(document.getElementById("applyChannel"), 1);
      await chooseLookup("branch");
      await chooseSelect(document.getElementById("handlingType"), 1);

      /* ── 차주 정보 (사업자번호 조회 → 자동입력) ── */
      await typeValue(document.getElementById("bizRegNo"), demoFields.bizRegNo, 32);
      /* 조회 버튼 클릭 → 차주명·대표자명·법인구분·업종 자동채움 */
      const bizBtn = document.querySelector('.icon-btn[data-popup="biz"]');
      clickPulse(bizBtn);
      await sleep(400);
      document.getElementById("borrowerName").value = demoFields.borrowerName;
      clickPulse(document.getElementById("borrowerName"));
      await sleep(120);
      document.getElementById("ceoName").value = demoFields.ceoName;
      clickPulse(document.getElementById("ceoName"));
      await sleep(120);
      await chooseSelect(document.getElementById("corpType"), 1);
      document.getElementById("industry").value = demoFields.industry;
      clickPulse(document.getElementById("industry"));
      await sleep(180);

      /* ── 대출 신청 정보 ── */
      await typeValue(document.getElementById("loanProduct"), demoFields.loanProduct, 30);
      await typeValue(document.getElementById("applyDate"), demoFields.applyDate, 24);
      await typeValue(document.getElementById("loanAmount"), demoFields.loanAmount, 24);
      await typeValue(document.getElementById("loanPeriod"), demoFields.loanPeriod, 28);

      /* 하단으로 부드럽게 스크롤 */
      const formScroll = document.querySelector(".form-scroll");
      if(formScroll) await smoothScrollToBottom(formScroll, 800);
      await sleep(200);

      await chooseSelect(document.getElementById("repaymentType"), 1);
      await chooseSelect(document.getElementById("rateType"), 1);
      await chooseSelect(document.getElementById("paymentCycle"), 1);
      await typeValue(document.getElementById("fundPurpose"), demoFields.fundPurpose, 42);
      await chooseSelect(document.getElementById("collateralType"), 1);
      await typeValue(document.getElementById("collateralInfo"), demoFields.collateralInfo, 24);

      await sleep(180);
      const nextBtn = document.querySelector(".actions .btn.primary");
      clickPulse(nextBtn);
      await sleep(220);
    }

    window.addEventListener("load", () => {
      runDemoSequence().then(() => {
        window.WBAutoPaging?.moveToNextIfEnabled?.(700);
      });
    });
  </script>
