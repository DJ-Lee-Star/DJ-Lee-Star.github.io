<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="./images/favicon.png" />
  <title>P5 진위검증</title>
  <link href="./fonts/fonts.css" rel="stylesheet" />
  <style>
    :root{
      --bg:         #0D0D0F;
      --bg-panel:   #131315;
      --card:       #1A1A1E;
      --card-alt:   #222226;
      --card-head:  #28282D;
      --line:       #333338;
      --line-soft:  #2A2A2F;
      --line-focus: #E8A838;
      --text:       #F0EDE8;
      --text-sub:   #A09A90;
      --text-muted: #6B665E;
      --amber:      #E8A838;
      --amber-dim:  #C48820;
      --amber-soft: rgba(232,168,56,0.10);
      --amber-glow: rgba(232,168,56,0.18);
      --ok:         #4ADE80;
      --ok-soft:    rgba(74,222,128,0.10);
      --ok-border:  rgba(74,222,128,0.30);
      --run:        #E8A838;
      --run-soft:   rgba(232,168,56,0.10);
      --run-border: rgba(232,168,56,0.30);
      --warn:       #FB923C;
      --warn-soft:  rgba(251,146,60,0.10);
      --shadow-s:   0 1px 4px rgba(0,0,0,0.50);
      --shadow-m:   0 4px 16px rgba(0,0,0,0.60);
      --shadow-l:   0 12px 40px rgba(0,0,0,0.65);
      --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
      --ease: 0.22s ease;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:#080808;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:"Pretendard","Malgun Gothic","Segoe UI",sans-serif;
      color:var(--text);
    }
    .app-shell{
      width:1280px;
      height:720px;
      background:var(--bg);
      border:1px solid var(--line);
      border-radius:12px;
      box-shadow:var(--shadow-l);
      overflow:hidden;
      position:relative;
    }
    .header{
      height:64px;
      background:linear-gradient(135deg, #0F0F11, #161618, #1C1C1F);
      border-bottom:1px solid var(--line);
      padding:12px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:relative;
    }
    .header::after{
      content:"";
      position:absolute;
      bottom:0;
      left:0;
      right:0;
      height:2px;
      background:linear-gradient(90deg, transparent, var(--amber), var(--amber-dim), transparent);
    }
    .lottie-icon{width:32px;height:32px;flex-shrink:0}
    .lottie-icon svg path{stroke:var(--amber) !important}
    .title-group{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .title{
      font-size:24px;
      font-weight:800;
      line-height:1;
      color:#ffffff;
      text-shadow:0 0 18px var(--amber-glow), 0 0 40px rgba(232,168,56,0.08);
      letter-spacing:-0.3px;
    }
    .meta{
      font-size:13px;
      color:var(--amber);
      font-weight:700;
      font-family:"IBM Plex Mono",monospace;
      border:1px solid var(--amber-dim);
      background:var(--amber-soft);
      border-radius:999px;
      padding:5px 12px;
      letter-spacing:0.5px;
    }
    .run-badge{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--text);
      background:var(--card-alt);
      border:1px solid var(--line);
      border-radius:var(--r-sm);
      padding:6px 14px;
      font-size:14px;
      font-weight:700;
      letter-spacing:.15px;
      user-select:none;
      cursor:default;
    }
    .run-badge::before{
      content:"";
      display:inline-block;
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--amber);
      box-shadow:0 0 6px var(--amber);
      animation:dotBlink 1.2s ease-in-out infinite;
      flex-shrink:0;
    }
    @keyframes dotBlink{
      0%,100%{opacity:1;box-shadow:0 0 6px var(--amber);}
      50%{opacity:0.3;box-shadow:0 0 2px var(--amber);}
    }
    .content{
      height:656px;
      padding:10px;
      display:grid;
      grid-template-rows:105px 1fr;
      gap:6px;
      background:var(--bg-panel);
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r-md);
      overflow:hidden;
    }
    .flow{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      height:100%;
      padding:6px 8px;
      background:var(--bg);
    }
    .step{
      min-width:142px;
      border:1px solid var(--line);
      border-radius:var(--r-sm);
      padding:20px 16px;
      background:var(--card-alt);
      text-align:center;
      font-size:17px;
      color:var(--text-muted);
      font-weight:700;
    }
    .step.active{
      color:var(--amber);
      border-color:var(--amber-dim);
      background:var(--amber-soft);
    }
    .step.done{
      color:var(--amber);
      border-color:var(--amber-dim);
      background:var(--amber-soft);
    }
    .step.active.prep{
      color:var(--ok);
      border-color:var(--ok-border);
      background:var(--ok-soft);
      animation:activePrepBlink 1s ease-in-out infinite;
    }
    @keyframes activePrepBlink{
      0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}
      50%{box-shadow:0 0 0 6px rgba(74,222,128,0.16)}
    }
    .arrow{color:var(--text-muted);font-size:16px;line-height:1}
    .main{min-height:0}
    .main>.card{
      min-height:0;
      height:100%;
      display:flex;
      flex-direction:column;
    }
    .box-h{
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      font-size:15px;
      font-weight:800;
      color:var(--text);
      background:var(--card-head);
    }
    .box-b{
      padding:8px;
      flex:1;
      min-height:0;
      background:var(--bg-panel);
    }
    .verify-table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      background:var(--card-alt);
      border:1px solid var(--line);
      border-radius:var(--r-md);
      overflow:hidden;
      font-size:14px;
    }
    .verify-table th{
      background:var(--card-head);
      color:var(--text-sub);
      font-weight:700;
      border-bottom:1px solid var(--line);
      border-right:1px solid var(--line);
      padding:9px 8px;
      text-align:left;
      font-family:"Pretendard","Malgun Gothic",sans-serif;
    }
    .verify-table th:last-child{border-right:0}
    .verify-table td{
      border-bottom:1px solid var(--line-soft);
      border-right:1px solid var(--line-soft);
      padding:9px 8px;
      color:var(--text-sub);
      vertical-align:middle;
    }
    .verify-table tr:last-child td{border-bottom:0}
    .verify-table td:last-child{border-right:0}
    .doc-name{font-weight:700;color:var(--text)}
    .issuer{color:var(--text-sub);font-weight:700}
    .rpa-row{
      display:grid;
      grid-template-columns:180px 130px 1fr;
      align-items:center;
      gap:10px;
      padding:12px 12px;
      margin-bottom:16px;
      background:var(--card-alt);
      border:1px solid var(--line);
      border-radius:var(--r-md);
    }
    .rpa-label{
      font-size:14px;
      font-weight:800;
      color:var(--text);
    }
    .rpa-status{
      font-size:13px;
      font-weight:700;
      color:var(--amber);
      font-family:"IBM Plex Mono",monospace;
    }
    .rpa-status.done{color:var(--ok)}
    .rpa-track{
      height:16px;
      border:1px solid var(--line);
      background:var(--card-head);
      border-radius:999px;
      overflow:hidden;
    }
    .rpa-fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg, var(--amber-dim), var(--amber));
      transition:width .15s linear;
    }
    .badge{
      border:1px solid var(--line);
      border-radius:999px;
      padding:4px 9px;
      font-size:12px;
      font-weight:700;
      color:var(--text-muted);
      background:rgba(90,107,130,0.12);
    }
    .badge.run{
      color:var(--run);
      border-color:var(--run-border);
      background:var(--run-soft);
    }
    .badge.ok{
      border-color:var(--ok-border);
      color:var(--ok);
      background:var(--ok-soft);
    }
    .blink{animation:blinkPulse .8s ease-in-out 2}
    @keyframes blinkPulse{
      0%,100%{box-shadow:0 0 0 0 rgba(232,168,56,0)}
      50%{box-shadow:0 0 0 6px rgba(232,168,56,0.18)}
    }
    .state{
      border-radius:999px;
      padding:4px 9px;
      font-size:12px;
      font-weight:700;
      border:1px solid var(--line);
      color:var(--text-muted);
      background:rgba(90,107,130,0.12);
    }
    .state.run{
      color:var(--run);
      border-color:var(--run-border);
      background:var(--run-soft);
    }
    .state.done{
      color:var(--ok);
      border-color:var(--ok-border);
      background:var(--ok-soft);
    }
    .legend{
      margin-top:8px;
      display:flex;
      justify-content:flex-end;
      gap:8px;
      font-size:12px;
      color:var(--text-muted);
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <div class="title-group">
        <div class="lottie-icon" id="gearAnim"></div>
        <div class="title">진위검증</div>
        <div class="meta">Agent</div>
      </div>
      <div class="run-badge">백그라운드 실행</div>
    </div>

    <div class="content">
      <section class="card">
        <div class="flow">
          <div class="step done">실행 계획 수립</div>
          <div class="arrow">→</div>
          <div class="step done">문서 전처리</div>
          <div class="arrow">→</div>
          <div class="step active prep" id="activeFlowStep">진위검증</div>
          <div class="arrow">→</div>
          <div class="step">AI-OCR 및 필드 추출</div>
          <div class="arrow">→</div>
          <div class="step">대사/검증</div>
        </div>
      </section>

      <section class="main">
        <article class="card">
          <div class="box-h">진위검증 실행</div>
          <div class="box-b">
            <div class="rpa-row" aria-label="진위확인 RPA 로딩 상태">
              <div class="rpa-label">진위확인 RPA</div>
              <div class="rpa-status" id="rpaStatus">로딩중 0%</div>
              <div class="rpa-track"><div class="rpa-fill" id="rpaProgress"></div></div>
            </div>
            <table class="verify-table" aria-label="진위검증 실행 목록">
              <thead>
                <tr>
                  <th style="width:260px">문서명</th>
                  <th style="width:200px">발급기관</th>
                  <th style="width:180px">기관 API 호출</th>
                  <th style="width:180px">응답전문 파싱</th>
                  <th style="width:180px">진위 확인</th>
                </tr>
              </thead>
              <tbody>
                <tr data-row="0">
                  <td class="doc-name">사업자등록증명원.pdf</td>
                  <td class="issuer">국세청(홈택스)</td>
                  <td><span class="state verify-state" data-stage="api">대기</span></td>
                  <td><span class="state verify-state" data-stage="parse">대기</span></td>
                  <td><span class="state verify-state" data-stage="compare">대기</span></td>
                </tr>
                <tr data-row="1">
                  <td class="doc-name">법인등기부등본.pdf</td>
                  <td class="issuer">대법원 인터넷등기소</td>
                  <td><span class="state verify-state" data-stage="api">대기</span></td>
                  <td><span class="state verify-state" data-stage="parse">대기</span></td>
                  <td><span class="state verify-state" data-stage="compare">대기</span></td>
                </tr>
                <tr data-row="2">
                  <td class="doc-name">법인인감증명서.pdf</td>
                  <td class="issuer">국세청(홈택스)</td>
                  <td><span class="state verify-state" data-stage="api">대기</span></td>
                  <td><span class="state verify-state" data-stage="parse">대기</span></td>
                  <td><span class="state verify-state" data-stage="compare">대기</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </article>
      </section>
    </div>
  </div>

  <script src="./js/common.js"></script>
  <script>
    const TOTAL_RUN_MS = 10000;
    const DEMO_SCALE = TOTAL_RUN_MS / 10000;
    const activeFlowStep = document.getElementById("activeFlowStep");
    const verifyRows = Array.from(document.querySelectorAll("tbody tr[data-row]"));
    const rpaStatus = document.getElementById("rpaStatus");
    const rpaProgress = document.getElementById("rpaProgress");

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms * DEMO_SCALE));
    }

    function setVerifyState(rowIdx, stage, state){
      const row = verifyRows[rowIdx];
      if(!row) return;
      const item = row.querySelector(`.verify-state[data-stage="${stage}"]`);
      if(!item) return;
      item.classList.remove("run", "done", "blink");
      if(state === "run"){
        item.classList.add("run");
        item.textContent = "진행중";
      } else if(state === "done"){
        item.classList.add("done");
        item.textContent = "완료";
      } else {
        item.textContent = "대기";
      }
      item.classList.add("blink");
      setTimeout(() => item.classList.remove("blink"), 1200);
    }

    function getStagedProgress(t){
      const points = [
        { t: 0.00, p: 0 },
        { t: 0.18, p: 14 },
        { t: 0.33, p: 33 },
        { t: 0.50, p: 47 },
        { t: 0.65, p: 68 },
        { t: 0.78, p: 76 },
        { t: 0.90, p: 89 },
        { t: 0.97, p: 95 },
        { t: 1.00, p: 100 }
      ];
      for(let i = 0; i < points.length - 1; i++){
        const a = points[i];
        const b = points[i + 1];
        if(t >= a.t && t <= b.t){
          const local = (t - a.t) / (b.t - a.t || 1);
          const eased = 1 - Math.pow(1 - local, 2);
          return a.p + (b.p - a.p) * eased;
        }
      }
      return 100;
    }

    async function runRpaLoading(){
      const duration = 2200 * DEMO_SCALE;
      const started = performance.now();
      rpaStatus.textContent = "로딩중";
      rpaStatus.classList.remove("done");
      rpaProgress.style.width = "0%";
      let rendered = 0;
      while(true){
        const elapsed = performance.now() - started;
        const t = Math.min(elapsed / duration, 1);
        let target = getStagedProgress(t);
        if(t < 0.97){
          target = Math.min(99, target + Math.random() * 1.5);
        }
        rendered = Math.max(rendered, target);
        const percent = Math.min(99, Math.floor(rendered));
        rpaProgress.style.width = `${percent}%`;
        rpaStatus.textContent = `로딩중 ${percent}%`;
        if(t >= 1) break;
        await sleep(80 + Math.random() * 120);
      }

      rpaProgress.style.width = "100%";
      rpaStatus.textContent = "로딩 완료 100%";
      rpaStatus.classList.add("done");
    }

    async function runRowPipeline(rowIdx){
      const apiDurations = [2000, 1000, 1500];
      const apiMs = apiDurations[rowIdx] ?? 1200;
      setVerifyState(rowIdx, "api", "run");
      await sleep(apiMs);
      setVerifyState(rowIdx, "api", "done");
      setVerifyState(rowIdx, "parse", "run");
      await sleep(550);
      setVerifyState(rowIdx, "parse", "done");
      setVerifyState(rowIdx, "compare", "run");
      await sleep(550);
      setVerifyState(rowIdx, "compare", "done");
    }

    async function runP5Animation(){
      await sleep(700);
      await runRpaLoading();
      const jobs = [0, 1, 2].map(rowIdx => runRowPipeline(rowIdx));
      await Promise.all(jobs);

      activeFlowStep.classList.remove("prep");
    }

    window.addEventListener("load", () => {
      runP5Animation().then(() => {
        window.WBAutoPaging?.moveToNextIfEnabled?.(700);
      });
    });
  </script>
