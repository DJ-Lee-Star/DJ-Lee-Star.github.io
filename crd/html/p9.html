<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="./images/favicon.png" />
  <title>P9 대사/검증</title>
  <link href="./fonts/fonts.css" rel="stylesheet" />
  <style>
    :root{
      --bg:         #0D0D0F;
      --bg-panel:   #131315;
      --card:       #1A1A1E;
      --card-alt:   #222226;
      --card-head:  #28282D;
      --line:       #333338;
      --line-soft:  #2A2A2F;
      --line-focus: #E8A838;
      --text:       #F0EDE8;
      --text-sub:   #A09A90;
      --text-muted: #6B665E;
      --amber:      #E8A838;
      --amber-dim:  #C48820;
      --amber-soft: rgba(232,168,56,0.10);
      --amber-glow: rgba(232,168,56,0.18);
      --ok:         #4ADE80;
      --ok-soft:    rgba(74,222,128,0.10);
      --ok-border:  rgba(74,222,128,0.30);
      --run:        #E8A838;
      --run-soft:   rgba(232,168,56,0.10);
      --run-border: rgba(232,168,56,0.30);
      --warn:       #FB923C;
      --warn-soft:  rgba(251,146,60,0.10);
      --shadow-s:   0 1px 4px rgba(0,0,0,0.50);
      --shadow-m:   0 4px 16px rgba(0,0,0,0.60);
      --shadow-l:   0 12px 40px rgba(0,0,0,0.65);
      --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
      --ease: 0.22s ease;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:#080808;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:"Pretendard","Malgun Gothic","Segoe UI",sans-serif;
      color:var(--text);
    }
    .app-shell{
      width:1280px;
      height:720px;
      background:var(--bg);
      border:1px solid var(--line);
      border-radius:12px;
      box-shadow:var(--shadow-l);
      overflow:hidden;
    }
    .header{
      height:64px;
      background:linear-gradient(135deg,#0F0F11 0%,#161618 60%,#1A1A1D 100%);
      border-bottom:1px solid var(--line);
      padding:12px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:relative;
    }
    .header::after{
      content:'';
      position:absolute;
      bottom:0;left:0;right:0;
      height:2px;
      background:linear-gradient(90deg,transparent,var(--amber),transparent);
      opacity:0.5;
    }
    .lottie-icon{width:32px;height:32px;flex-shrink:0}
    .lottie-icon svg path{stroke:var(--amber) !important}
    .title-group{display:flex;align-items:center;gap:10px}
    .title{
      font-size:24px;
      font-weight:800;
      line-height:1;
      color:var(--text);
      letter-spacing:-0.3px;
    }
    .meta{
      font-size:13px;
      color:var(--amber);
      font-weight:700;
      border:1px solid rgba(232,168,56,0.30);
      background:var(--amber-soft);
      border-radius:999px;
      padding:4px 10px;
      letter-spacing:0.5px;
    }
    .run-badge{
      display:flex;
      align-items:center;
      gap:7px;
      color:var(--text);
      background:rgba(232,168,56,0.08);
      border:1px solid rgba(232,168,56,0.25);
      border-radius:var(--r-sm);
      padding:6px 13px;
      font-size:14px;
      font-weight:700;
      letter-spacing:.15px;
      user-select:none;
      cursor:default;
    }
    .run-badge::before{
      content:'';
      width:7px;height:7px;
      border-radius:50%;
      background:var(--amber);
      box-shadow:0 0 6px var(--amber);
      animation:badgeBlink 1.2s ease-in-out infinite;
    }
    @keyframes badgeBlink{
      0%,100%{opacity:1;box-shadow:0 0 6px var(--amber)}
      50%{opacity:0.35;box-shadow:0 0 2px var(--amber)}
    }
    .content{
      height:656px;
      padding:10px;
      display:grid;
      grid-template-rows:105px 1fr;
      gap:6px;
      background:var(--bg-panel);
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r-md);
      overflow:hidden;
    }
    .flow{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      height:100%;
      padding:6px 8px;
      background:var(--bg);
    }
    .step{
      min-width:142px;
      border:1px solid var(--line);
      border-radius:var(--r-sm);
      padding:20px 16px;
      background:var(--card);
      text-align:center;
      font-size:17px;
      color:var(--text-muted);
      font-weight:700;
      transition:all var(--ease);
    }
    .step.active{
      color:var(--amber);
      border-color:rgba(232,168,56,0.35);
      background:var(--amber-soft);
    }
    .step.active.prep{
      color:var(--ok);
      border-color:var(--ok-border);
      background:var(--ok-soft);
      animation:activePrepBlink 1s ease-in-out infinite;
    }
    .step.done{
      color:var(--amber);
      border-color:rgba(232,168,56,0.25);
      background:var(--amber-soft);
    }
    @keyframes activePrepBlink{
      0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}
      50%{box-shadow:0 0 0 6px rgba(52,211,153,0.16)}
    }
    .arrow{color:var(--text-muted);font-size:16px;line-height:1}
    .main{min-height:0}
    .main>.card{min-height:0;height:100%;display:flex;flex-direction:column}
    .box-h{
      padding:10px 14px;
      border-bottom:1px solid var(--line);
      font-size:15px;
      font-weight:800;
      color:var(--text);
      background:var(--card-head);
      letter-spacing:-0.2px;
    }
    .box-b{
      padding:10px;
      flex:1;
      min-height:0;
      background:var(--bg-panel);
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .extract-table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      background:var(--card-alt);
      border:1px solid var(--line);
      border-radius:var(--r-md);
      overflow:hidden;
      font-size:14px;
    }
    .extract-table th{
      background:var(--card-head);
      color:var(--text-sub);
      font-weight:700;
      border-bottom:1px solid var(--line);
      border-right:1px solid var(--line);
      padding:9px 8px;
      text-align:left;
    }
    .extract-table th:last-child{border-right:0}
    .extract-table td{
      border-bottom:1px solid var(--line-soft);
      border-right:1px solid var(--line-soft);
      padding:9px 8px;
      color:var(--text-sub);
      vertical-align:middle;
    }
    .extract-table tr:last-child td{border-bottom:0}
    .extract-table td:last-child{border-right:0}
    .doc-name{font-weight:700;color:var(--text)}
    .field-name{color:var(--text-sub);font-weight:700}
    .state{
      border-radius:999px;
      padding:4px 9px;
      font-size:12px;
      font-weight:700;
      border:1px solid var(--line);
      color:var(--text-muted);
      background:rgba(107,102,94,0.12);
      transition:all var(--ease);
    }
    .state.run{
      color:var(--run);
      background:var(--run-soft);
      border-color:var(--run-border);
    }
    .state.done{
      color:var(--ok);
      background:var(--ok-soft);
      border-color:var(--ok-border);
    }
    .state.final-done{
      color:var(--amber);
      background:var(--amber-soft);
      border-color:rgba(232,168,56,0.25);
    }
    .blink{animation:blinkPulse .8s ease-in-out 2}
    @keyframes blinkPulse{
      0%,100%{box-shadow:0 0 0 0 rgba(232,168,56,0)}
      50%{box-shadow:0 0 0 6px var(--amber-glow)}
    }
    .tool-area{
      margin-top:14px;
      padding:12px;
      border:1px solid var(--line);
      border-radius:var(--r-md);
      background:var(--card-alt);
      display:none;
    }
    .tool-area.show{display:block}
    .tool-row{
      display:grid;
      grid-template-columns:220px 160px 1fr;
      align-items:center;
      gap:10px;
    }
    .tool-label{
      font-size:14px;
      font-weight:700;
      color:var(--text);
    }
    .tool-status{
      font-size:13px;
      font-weight:500;
      color:var(--amber);
      font-family:"IBM Plex Mono",monospace;
    }
    .tool-status.done{color:var(--ok)}
    .tool-track{
      height:16px;
      border:1px solid var(--line);
      background:var(--card-head);
      border-radius:999px;
      overflow:hidden;
    }
    .tool-fill{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,var(--amber-dim),var(--amber));
      transition:width .15s linear;
    }
    .send-line{
      margin-top:12px;
      padding-top:10px;
      border-top:1px dashed var(--line);
      font-size:14px;
      font-weight:700;
      color:var(--text-sub);
      display:none;
    }
    .send-line.show{display:block}
    .send-line.done{
      color:var(--ok);
      animation:sendDoneBlink .9s ease-in-out 3;
    }
    @keyframes sendDoneBlink{
      0%,100%{opacity:1}
      50%{opacity:.25}
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <div class="title-group">
        <div class="lottie-icon" id="gearAnim"></div>
        <div class="title">대사/검증</div>
        <div class="meta">Agent</div>
      </div>
      <div class="run-badge">백그라운드 실행</div>
    </div>

    <div class="content">
      <section class="card">
        <div class="flow">
          <div class="step done">실행 계획 수립</div>
          <div class="arrow">→</div>
          <div class="step done">문서 전처리</div>
          <div class="arrow">→</div>
          <div class="step done">진위검증</div>
          <div class="arrow">→</div>
          <div class="step done">AI-OCR 및 필드 추출</div>
          <div class="arrow">→</div>
          <div class="step active prep" id="activeFlowStep">대사/검증</div>
        </div>
      </section>

      <section class="main">
        <article class="card">
          <div class="box-h">대사/검증 실행</div>
          <div class="box-b">
            <table class="extract-table" aria-label="대사/검증 실행 목록">
              <thead>
                <tr>
                  <th style="width:170px">문서명</th>
                  <th style="width:130px">입력값 대사</th>
                  <th style="width:130px">문서간 대사</th>
                  <th style="width:140px">필수값 누락 검증</th>
                  <th style="width:115px">타입 검증</th>
                  <th style="width:115px">유효값 검증</th>
                  <th style="width:130px">KYC 교차검증</th>
                  <th style="width:110px">최종 판정</th>
                </tr>
              </thead>
              <tbody>
                <tr data-row="0">
                  <td class="doc-name">사업자등록증명원.pdf</td>
                  <td><span class="state verify-state" data-stage="input">대기</span></td>
                  <td><span class="state verify-state" data-stage="crossdoc">대기</span></td>
                  <td><span class="state verify-state" data-stage="required">대기</span></td>
                  <td><span class="state verify-state" data-stage="type">대기</span></td>
                  <td><span class="state verify-state" data-stage="valid">대기</span></td>
                  <td><span class="state verify-state" data-stage="kyc">대기</span></td>
                  <td><span class="state final-state" data-stage="final">대기</span></td>
                </tr>
                <tr data-row="1">
                  <td class="doc-name">법인등기부등본.pdf</td>
                  <td><span class="state verify-state" data-stage="input">대기</span></td>
                  <td><span class="state verify-state" data-stage="crossdoc">대기</span></td>
                  <td><span class="state verify-state" data-stage="required">대기</span></td>
                  <td><span class="state verify-state" data-stage="type">대기</span></td>
                  <td><span class="state verify-state" data-stage="valid">대기</span></td>
                  <td><span class="state verify-state" data-stage="kyc">대기</span></td>
                  <td><span class="state final-state" data-stage="final">대기</span></td>
                </tr>
              </tbody>
            </table>
            <div class="tool-area" id="messageToolArea" aria-label="메세지 전송 Tool 실행 영역">
              <div class="tool-row">
                <div class="tool-label">메세지 전송 Tool</div>
                <div class="tool-status" id="toolStatus">로딩중 0%</div>
                <div class="tool-track"><div class="tool-fill" id="toolProgress"></div></div>
              </div>
              <div class="send-line" id="sendStatusLine">확인 메세지 전송중</div>
            </div>
          </div>
        </article>
      </section>
    </div>
  </div>

  <script src="./js/common.js"></script>
  <script>
    const rows = Array.from(document.querySelectorAll("tbody tr[data-row]"));
    const activeFlowStep = document.getElementById("activeFlowStep");
    const messageToolArea = document.getElementById("messageToolArea");
    const toolStatus = document.getElementById("toolStatus");
    const toolProgress = document.getElementById("toolProgress");
    const sendStatusLine = document.getElementById("sendStatusLine");

    function getDoneLabel(stage){
      const compareStages = new Set(["input", "crossdoc"]);
      if(compareStages.has(stage)) return "일치";
      return "정상";
    }

    function setState(rowIdx, stage, state){
      const row = rows[rowIdx];
      if(!row) return;
      const item = row.querySelector(`.state[data-stage="${stage}"]`);
      if(!item) return;
      item.classList.remove("run", "done", "final-done", "blink");
      if(state === "run"){
        item.classList.add("run");
        item.textContent = "진행중";
      } else if(state === "done"){
        item.classList.add("done");
        item.textContent = getDoneLabel(stage);
        if(stage === "final") item.classList.add("final-done");
      } else {
        item.textContent = "대기";
      }
      item.classList.add("blink");
      setTimeout(() => item.classList.remove("blink"), 1100);
    }

    function wait(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function stagedProgress(t){
      const points = [
        { t: 0.00, p: 0 },
        { t: 0.22, p: 16 },
        { t: 0.40, p: 39 },
        { t: 0.58, p: 57 },
        { t: 0.74, p: 77 },
        { t: 0.88, p: 90 },
        { t: 0.96, p: 96 },
        { t: 1.00, p: 100 }
      ];
      for(let i = 0; i < points.length - 1; i++){
        const a = points[i];
        const b = points[i + 1];
        if(t >= a.t && t <= b.t){
          const local = (t - a.t) / (b.t - a.t || 1);
          const eased = 1 - Math.pow(1 - local, 2);
          return a.p + (b.p - a.p) * eased;
        }
      }
      return 100;
    }

    async function runMessageToolSequence(){
      messageToolArea.classList.add("show");
      toolStatus.textContent = "로딩중 0%";
      toolStatus.classList.remove("done");
      toolProgress.style.width = "0%";
      sendStatusLine.classList.remove("show", "done");

      const duration = 2000;
      const started = performance.now();
      let rendered = 0;
      while(true){
        const elapsed = performance.now() - started;
        const t = Math.min(elapsed / duration, 1);
        let target = stagedProgress(t);
        if(t < 0.97){
          target = Math.min(99, target + Math.random() * 1.2);
        }
        rendered = Math.max(rendered, target);
        const percent = Math.min(99, Math.floor(rendered));
        toolProgress.style.width = `${percent}%`;
        toolStatus.textContent = `로딩중 ${percent}%`;
        if(t >= 1) break;
        await wait(80 + Math.random() * 120);
      }

      toolProgress.style.width = "100%";
      toolStatus.textContent = "로딩 완료 100%";
      toolStatus.classList.add("done");

      await wait(350);
      sendStatusLine.classList.add("show");
      sendStatusLine.textContent = "확인 메세지 전송중";
      await wait(900);
      sendStatusLine.textContent = "전송완료";
      sendStatusLine.classList.add("done");
    }

    async function runRowPipeline(rowIdx, cfg){
      // 입력값 대사는 두 문서 동시 시작, 완료 시점만 다름
      await wait(cfg.input);
      setState(rowIdx, "input", "done");

      const stages = ["crossdoc", "required", "type", "valid", "kyc"];
      for(const stage of stages){
        setState(rowIdx, stage, "run");
        await wait(cfg[stage]);
        setState(rowIdx, stage, "done");
      }

      setState(rowIdx, "final", "run");
      await wait(cfg.final);
      setState(rowIdx, "final", "done");
    }

    async function runP9Animation(){
      await wait(500);

      // 입력값 대사 동시 시작
      setState(0, "input", "run");
      setState(1, "input", "run");

      const rowConfigs = [
        { input:1200, crossdoc:900, required:540, type:1250, valid:760, kyc:1380, final:820 },
        { input:400,  crossdoc:1450, required:680, type:960,  valid:1320, kyc:560,  final:1080 }
      ];

      await Promise.all(rows.map((_, idx) => runRowPipeline(idx, rowConfigs[idx])));
      activeFlowStep.classList.remove("prep");
      await runMessageToolSequence();
    }

    window.addEventListener("load", () => {
      runP9Animation().then(() => {
        window.WBAutoPaging?.moveToNextIfEnabled?.(700);
      });
    });
  </script>
