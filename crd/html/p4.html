<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="./images/favicon.png" />
  <title>P4 문서 전처리</title>
  <link href="./fonts/fonts.css" rel="stylesheet" />
  <style>
    :root{
      --bg:         #0D0D0F;
      --bg-panel:   #131315;
      --card:       #1A1A1E;
      --card-alt:   #222226;
      --card-head:  #28282D;
      --line:       #333338;
      --line-soft:  #2A2A2F;
      --line-focus: #E8A838;
      --text:       #F0EDE8;
      --text-sub:   #A09A90;
      --text-muted: #6B665E;
      --amber:      #E8A838;
      --amber-dim:  #C48820;
      --amber-soft: rgba(232,168,56,0.10);
      --amber-glow: rgba(232,168,56,0.18);
      --ok:         #4ADE80;
      --ok-soft:    rgba(74,222,128,0.10);
      --ok-border:  rgba(74,222,128,0.30);
      --run:        #E8A838;
      --run-soft:   rgba(232,168,56,0.10);
      --run-border: rgba(232,168,56,0.30);
      --warn:       #FB923C;
      --warn-soft:  rgba(251,146,60,0.10);
      --shadow-s:   0 1px 4px rgba(0,0,0,0.50);
      --shadow-m:   0 4px 16px rgba(0,0,0,0.60);
      --shadow-l:   0 12px 40px rgba(0,0,0,0.65);
      --r-sm: 6px; --r-md: 10px; --r-lg: 14px;
      --ease: 0.22s ease;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:#080808;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:"Pretendard","Malgun Gothic","Segoe UI",sans-serif;
      color:var(--text);
    }
    .app-shell{
      width:1280px;
      height:720px;
      background:var(--bg);
      border:1px solid var(--line);
      border-radius:12px;
      box-shadow:var(--shadow-l), 0 0 60px rgba(232,168,56,0.03);
      overflow:hidden;
    }

    /* HEADER */
    .header{
      height:64px;
      background:linear-gradient(135deg, #0F0F11 0%, #161618 50%, #1C1C1F 100%);
      border-bottom:1px solid var(--line);
      padding:12px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:relative;
      overflow:hidden;
    }
    .header::after{
      content:"";
      position:absolute;
      bottom:0; left:0; right:0;
      height:2px;
      background:linear-gradient(90deg, transparent, var(--amber), var(--amber-dim), transparent);
      opacity:0.7;
    }
    .lottie-icon{width:32px;height:32px;flex-shrink:0}
    .lottie-icon svg path{stroke:var(--amber) !important}
    .title-group{
      display:flex;
      align-items:center;
      gap:10px;
      position:relative;
      z-index:1;
    }
    .title{
      font-size:24px;
      font-weight:800;
      line-height:1;
      color:var(--text);
      text-shadow:0 0 20px rgba(232,168,56,0.12);
    }
    .meta{
      font-size:12px;
      color:var(--amber);
      font-weight:500;
      font-family:inherit;
      border:1px solid rgba(232,168,56,0.25);
      background:var(--amber-soft);
      border-radius:999px;
      padding:5px 10px;
    }
    .run-badge{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--amber);
      background:rgba(232,168,56,0.06);
      border:1px solid rgba(232,168,56,0.20);
      border-radius:var(--r-sm);
      padding:6px 12px;
      font-size:13px;
      font-weight:700;
      font-family:inherit;
      letter-spacing:.15px;
      user-select:none;
      cursor:default;
      position:relative;
      z-index:1;
    }
    .run-badge::before{
      content:"";
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--amber);
      box-shadow:0 0 6px var(--amber);
      animation:blinkDot 1.1s ease-in-out infinite;
      flex-shrink:0;
    }
    @keyframes blinkDot{
      0%,100%{opacity:1}
      50%{opacity:0.25}
    }

    /* CONTENT */
    .content{
      height:656px;
      padding:10px;
      display:grid;
      grid-template-rows:105px 1fr;
      gap:6px;
      background:var(--bg-panel);
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--r-md);
      overflow:hidden;
    }

    /* FLOW */
    .flow{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      height:100%;
      padding:6px 8px;
      background:var(--bg);
    }
    .step{
      min-width:142px;
      border:1px solid var(--line);
      border-radius:var(--r-sm);
      padding:20px 16px;
      background:var(--card);
      text-align:center;
      font-size:17px;
      color:var(--text-muted);
      font-weight:800;
      transition:all var(--ease);
    }
    .step.active{
      color:var(--amber);
      border-color:rgba(232,168,56,0.35);
      background:var(--amber-soft);
    }
    .step.done{
      color:var(--amber);
      border-color:rgba(232,168,56,0.35);
      background:var(--amber-soft);
    }
    .step.active.prep{
      color:var(--ok);
      border-color:var(--ok-border);
      background:var(--ok-soft);
      animation:activePrepBlink 1s ease-in-out infinite;
    }
    @keyframes activePrepBlink{
      0%,100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}
      50%{box-shadow:0 0 0 6px rgba(74,222,128,0.16)}
    }
    .arrow{color:var(--text-muted);font-size:16px;line-height:1}

    /* MAIN GRID */
    .main{
      display:grid;
      grid-template-columns:360px 1fr;
      gap:8px;
      min-height:0;
    }
    .main>.card{
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .box-h{
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      font-size:15px;
      font-weight:800;
      color:var(--text);
      background:var(--card-head);
    }
    .box-b{
      padding:8px;
      flex:1;
      min-height:0;
      background:var(--card);
    }

    /* DOC LIST */
    .doc-list{background:var(--card-alt)}
    .doc-list .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      padding:6px 0;
      border-bottom:1px solid var(--line-soft);
      font-size:13px;
      color:var(--text-sub);
    }
    .doc-list .row:last-child{border-bottom:0}

    /* BADGES */
    .badge{
      border:1px solid var(--line);
      border-radius:999px;
      padding:4px 9px;
      font-size:12px;
      font-weight:700;
      color:var(--text-muted);
      background:var(--card);
    }
    .badge.run{
      color:var(--run);
      border-color:var(--run-border);
      background:var(--run-soft);
    }
    .badge.ok{
      border-color:var(--ok-border);
      color:var(--ok);
      background:var(--ok-soft);
    }
    .blink{animation:blinkPulse .8s ease-in-out 2}
    @keyframes blinkPulse{
      0%,100%{box-shadow:0 0 0 0 rgba(232,168,56,0)}
      50%{box-shadow:0 0 0 6px rgba(232,168,56,0.18)}
    }

    /* PLAN GRID */
    .plan-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .plan-card{
      border:1px solid var(--line);
      border-radius:var(--r-md);
      overflow:hidden;
      background:var(--card-alt);
    }
    .plan-card .h{
      padding:9px 10px;
      border-bottom:1px solid var(--line);
      font-size:14px;
      font-weight:800;
      color:var(--text);
      background:var(--card-head);
    }
    .plan-card .b{
      padding:8px 10px;
      background:var(--card-alt);
      font-size:13px;
      font-family:inherit;
      color:var(--text-sub);
      min-height:70px;
      line-height:1.5;
    }
    .plan-card .b.pending{
      color:var(--text-muted);
      font-weight:700;
    }

    /* ORDER / TIMELINE */
    .order{
      margin-top:6px;
      border:1px solid var(--line);
      border-radius:var(--r-md);
      overflow:hidden;
      background:var(--card-alt);
    }
    .order .h{
      padding:9px 10px;
      border-bottom:1px solid var(--line);
      font-size:14px;
      font-weight:800;
      color:var(--text);
      background:var(--card-head);
    }
    .timeline{
      padding:6px 10px;
      background:var(--card-alt);
    }
    .timeline .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:4px 0;
      border-bottom:1px solid var(--line-soft);
      font-size:13px;
      font-family:inherit;
      color:var(--text-sub);
    }
    .timeline .row:last-child{border-bottom:0}
    .state{
      border-radius:999px;
      padding:4px 9px;
      font-size:12px;
      font-weight:700;
      border:1px solid var(--line);
      color:var(--text-muted);
      background:var(--card);
    }
    .state.run{
      color:var(--run);
      border-color:var(--run-border);
      background:var(--run-soft);
    }
    .state.done{
      color:var(--ok);
      border-color:var(--ok-border);
      background:var(--ok-soft);
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="header">
      <div class="title-group">
        <div class="lottie-icon" id="gearAnim"></div>
        <div class="title">문서 전처리</div>
        <div class="meta">Agent</div>
      </div>
      <div class="run-badge">백그라운드 실행</div>
    </div>

    <div class="content">
      <section class="card">
        <div class="flow">
          <div class="step done">실행 계획 수립</div>
          <div class="arrow">→</div>
          <div class="step active prep" id="activeFlowStep">문서 전처리</div>
          <div class="arrow">→</div>
          <div class="step">진위검증</div>
          <div class="arrow">→</div>
          <div class="step">AI-OCR 및 필드 추출</div>
          <div class="arrow">→</div>
          <div class="step">대사/검증</div>
        </div>
      </section>

      <section class="main">
        <article class="card">
          <div class="box-h">전처리 대상 문서</div>
          <div class="box-b doc-list">
            <div class="row"><span>사업자등록증명원.pdf</span><span class="badge run doc-badge">진행중</span></div>
            <div class="row"><span>법인등기부등본.pdf</span><span class="badge run doc-badge">진행중</span></div>
            <div class="row"><span>표준재무제표증명.pdf</span><span class="badge run doc-badge">진행중</span></div>
          </div>
        </article>

        <article class="card">
          <div class="box-h">전처리 실행</div>
          <div class="box-b">
            <div class="plan-grid">
              <div class="plan-card">
                <div class="h">기울기 보정</div>
                <div class="b pending task-info">대상 문서 로딩 대기</div>
              </div>
              <div class="plan-card">
                <div class="h">노이즈 제거</div>
                <div class="b pending task-info">대상 문서 로딩 대기</div>
              </div>
              <div class="plan-card">
                <div class="h">명암/대비 보정</div>
                <div class="b pending task-info">대상 문서 로딩 대기</div>
              </div>
              <div class="plan-card">
                <div class="h">페이지 정렬</div>
                <div class="b pending task-info">대상 문서 로딩 대기</div>
              </div>
            </div>

            <div class="order">
              <div class="h">실행 순서 및 상태</div>
              <div class="timeline">
                <div class="row"><span>1) 기울기 보정</span><span class="state plan-state">대기</span></div>
                <div class="row"><span>2) 노이즈 제거</span><span class="state plan-state">대기</span></div>
                <div class="row"><span>3) 명암/대비 보정</span><span class="state plan-state">대기</span></div>
                <div class="row"><span>4) 페이지 정렬</span><span class="state plan-state">대기</span></div>
              </div>
            </div>
          </div>
        </article>
      </section>
    </div>
  </div>

  <script src="./js/common.js"></script>
  <script>
    const TOTAL_RUN_MS = 10000;
    const DEMO_SCALE = TOTAL_RUN_MS / 10000;
    const docBadges = Array.from(document.querySelectorAll(".doc-badge"));
    const taskInfos = Array.from(document.querySelectorAll(".task-info"));
    const planStates = Array.from(document.querySelectorAll(".plan-state"));
    const activeFlowStep = document.getElementById("activeFlowStep");

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms * DEMO_SCALE));
    }

    function setDocDone(idx){
      const badge = docBadges[idx];
      if(!badge) return;
      badge.textContent = "전처리 완료";
      badge.classList.remove("run");
      badge.classList.add("ok", "blink");
      setTimeout(() => badge.classList.remove("blink"), 1200);
    }

    function fillTaskTargets(){
      const contents = [
        "사업자등록증명원, 법인등기부등본",
        "사업자등록증명원, 표준재무제표증명",
        "표준재무제표증명, 법인등기부등본",
        "사업자등록증명원, 법인등기부등본, 표준재무제표증명"
      ];
      taskInfos.forEach((el, idx) => {
        el.textContent = contents[idx] || "-";
        el.classList.remove("pending");
        el.classList.add("blink");
        setTimeout(() => el.classList.remove("blink"), 1200);
      });
    }

    function setPlanState(idx, state){
      const item = planStates[idx];
      if(!item) return;
      item.classList.remove("run", "done", "blink");
      if(state === "run"){
        item.classList.add("run");
        item.textContent = "진행중";
      } else if(state === "done"){
        item.classList.add("done");
        item.textContent = "완료";
      } else {
        item.textContent = "대기";
      }
      item.classList.add("blink");
      setTimeout(() => item.classList.remove("blink"), 1200);
    }

    async function runP4Animation(){
      await sleep(900);
      fillTaskTargets();

      await sleep(800);
      setPlanState(0, "run");
      await sleep(900);
      setPlanState(0, "done");
      setDocDone(0);

      setPlanState(1, "run");
      await sleep(900);
      setPlanState(1, "done");
      setDocDone(1);
      setDocDone(2);

      setPlanState(2, "run");
      await sleep(900);
      setPlanState(2, "done");

      setPlanState(3, "run");
      await sleep(900);
      setPlanState(3, "done");
      await sleep(650);

      activeFlowStep.classList.remove("prep");
    }

    window.addEventListener("load", () => {
      runP4Animation().then(() => {
        window.WBAutoPaging?.moveToNextIfEnabled?.(700);
      });
    });
  </script>
